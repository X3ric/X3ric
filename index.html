<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shell</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Inconsolata:400,700|VT323" rel="stylesheet">
    <script>document.documentElement.className = 'js';</script>
</head>
<body class="shell">
    <section id="cursor" class="cursor"></section>
    <section id="cursorpoint" class="cursorpoint"></section>
    <div id="connecting-dots" class="connecting-dots">
        <canvas id="canvas"></canvas>
    </div>
    <div class="search search--open">
        <p class="terminal__line">Welcome:<span class="green"></span><span class="green" id="ip" style="font-size: 14px !important;"></span><span class="green">></span></p>
        <p class="terminal__line">How's the weather in: <span class="country green"></span>?</p>
        <p class="terminal__line">shell started.</p>
        <div class="terminal"></div>
        <form class="search__form" action="">
        	<input class="search__input" id="search__input" name="search" placeholder="Command Line" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" ></input>
            <div id="autocomplete-suggestions" class="autocomplete-suggestions"></div>
        </form>
    </div>
    /* Scripts extensions to have smooth animations and page working on smartphones */
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.19.1/easing/EasePack.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.19.1/TweenLite.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
